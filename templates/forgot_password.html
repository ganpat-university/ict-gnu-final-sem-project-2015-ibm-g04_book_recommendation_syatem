<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NovelNest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <section class="auth-card">
        <h1 class="auth-title">Reset your password</h1>
        <p class="auth-subtitle">We'll verify your email with a one-time code.</p>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}
        {% if success %}
        <p class="auth-success">{{ success }}</p>
        {% endif %}

        {% if step == "verify" %}
        <form class="auth-form" method="POST" action="/forgot-password/verify">
            <input class="auth-control" type="text" value="{{ email }}" disabled>
            <input class="auth-control" type="text" name="otp" placeholder="6-digit OTP" required>
            <input class="auth-control" type="password" name="new_password" placeholder="New Password" required>
            <button class="btn btn--primary" type="submit">Reset Password</button>
        </form>
        {% else %}
        <form class="auth-form" method="POST" action="/forgot-password">
            <input class="auth-control" type="email" name="email" placeholder="Email Address" required>
            <button class="btn btn--primary" type="submit">Send OTP</button>
        </form>
        {% endif %}

        <p class="auth-link-row">
            Remembered it? <a href="/login">Back to login</a>
        </p>
    </section>
</body>
</html>
