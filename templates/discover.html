{% extends "base.html" %}

{% block title %}Discover — NovelNest{% endblock %}

    <h1>Discover Dashboard</h1>
    <p>For You, Popular, and Because You Read — all in one place.</p>
</div>

<div class="tabs">
    <button class="tab-btn" data-tab="foryou">🔥 For You</button>
    <button class="tab-btn" data-tab="popular">⭐ Popular</button>
    <button class="tab-btn" data-tab="personalized">🎯 Because You Read</button>
</div>

<div class="tab-panel" id="tab-foryou" data-url="/api/recommendations/foryou"></div>
<div class="tab-panel" id="tab-popular" data-url="/api/recommendations/popular"></div>
<div class="tab-panel" id="tab-personalized" data-url="/api/recommendations/personalized"></div>
{% endblock %}
